; BikeOS ESP32 Firmware - VoidRoot
; All hardware the builder has confirmed purchased is now real: Hall
; wheel/cadence, VL53L1X, lights/buttons, INA219, MPU6050 (motion, used by
; the anti-theft alarm - see alarm.h).
;
; NOTE (see Architecture Review): framework is still an open decision.
; Arduino-as-a-component is used here as a *placeholder* so the project
; compiles on the widest range of dev boards. Revisit in favor of ESP-IDF
; native (or Arduino + explicit FreeRTOS tasks) per the review's Conflict #1
; if BLE notify timing and Hall ISR jitter ever become a real problem.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    pololu/VL53L1X @ ^1.0.3
    adafruit/Adafruit INA219 @ ^1.2.3
    adafruit/Adafruit BusIO @ ^1.16.1
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
